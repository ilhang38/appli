<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fridge2Plate">
<title>Fridge2Plate — Tes recettes, tes ingrédients</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FFF8EF;
  --cream-deep:#FCEFDD;
  --coral:#FF6B52;
  --coral-deep:#E6492F;
  --avocado:#3D8361;
  --avocado-deep:#2C6249;
  --mango:#FFC247;
  --mango-deep:#E8A411;
  --charcoal:#2B2118;
  --charcoal-soft:#5C5044;
  --white:#FFFFFF;
  --line:#EFE1CC;
  --shadow-card: 0 4px 14px rgba(43,33,24,0.08), 0 1px 3px rgba(43,33,24,0.06);
  --shadow-pop: 0 10px 30px rgba(255,107,82,0.28);
  --r-sm:12px;
  --r-md:18px;
  --r-lg:26px;
  --r-pill:999px;
}

*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0; padding:0;}
body{
  font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cream);
  color: var(--charcoal);
  min-height:100vh;
  overscroll-behavior-y: none;
  padding-bottom: calc(96px + env(safe-area-inset-bottom));
}

::selection{ background: var(--mango); color: var(--charcoal); }

.app{
  max-width: 560px;
  margin: 0 auto;
  padding: 0 18px;
  position: relative;
  transition: max-width .2s ease;
}

@media (min-width: 900px){
  .app{
    max-width: 1140px;
    padding: 0 32px;
  }
}

/* ---------- HEADER ---------- */
.topbar{
  position: sticky;
  top:0;
  z-index: 50;
  background: var(--cream);
  padding-top: calc(18px + env(safe-area-inset-top));
  padding-bottom: 10px;
}
.topbar::after{
  content:"";
  position:absolute; left:0; right:0; bottom:0; height:14px;
  background: linear-gradient(to bottom, var(--cream), transparent);
  pointer-events:none;
}
.brand{
  display:flex; align-items:center; justify-content:space-between;
  margin: 0 -18px;
  padding: 0 18px;
}
.brand-mark{
  display:flex; align-items:center; gap:10px;
}
.brand-mark .logo{
  width:40px; height:40px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--coral), var(--mango));
  display:flex; align-items:center; justify-content:center;
  font-size: 22px;
  box-shadow: var(--shadow-card);
  transform: rotate(-6deg);
}
.brand-mark h1{
  font-family:'Fredoka', sans-serif;
  font-size: 21px;
  font-weight: 600;
  margin:0;
  letter-spacing: -0.3px;
  line-height: 1.1;
}
.brand-mark .sub{
  font-size: 11.5px;
  color: var(--charcoal-soft);
  font-weight: 500;
  margin-top: 1px;
}
.reset-btn{
  border:none; background: var(--white);
  width:38px; height:38px; border-radius: var(--r-pill);
  display:flex; align-items:center; justify-content:center;
  box-shadow: var(--shadow-card);
  color: var(--charcoal-soft);
  font-size: 16px;
  cursor:pointer;
  transition: transform .15s ease;
}
.reset-btn:active{ transform: scale(0.9) rotate(-25deg); }

/* search */
.search-wrap{
  margin-top: 14px;
  position: relative;
}
.search-wrap input{
  width:100%;
  border: 2px solid var(--line);
  background: var(--white);
  border-radius: var(--r-pill);
  padding: 13px 18px 13px 44px;
  font-size: 15px;
  font-family: inherit;
  font-weight: 500;
  color: var(--charcoal);
  outline: none;
  transition: border-color .15s ease, box-shadow .15s ease;
}
.search-wrap input::placeholder{ color: #B8A98E; font-weight: 500; }
.search-wrap input:focus{
  border-color: var(--coral);
  box-shadow: 0 0 0 4px rgba(255,107,82,0.12);
}
.search-icon{
  position:absolute; left:16px; top:50%; transform: translateY(-50%);
  font-size:16px; opacity:0.5;
}

/* ---------- FILTER TABS (categories) ---------- */
.cat-tabs{
  display:flex; gap:8px;
  margin-top:14px;
  overflow-x:auto;
  padding-bottom: 2px;
  scrollbar-width: none;
  position: relative;
  mask-image: linear-gradient(to right, black calc(100% - 28px), transparent 100%);
  -webkit-mask-image: linear-gradient(to right, black calc(100% - 28px), transparent 100%);
}
.cat-tabs::-webkit-scrollbar{ display:none; }
.cat-tab{
  flex:0 0 auto;
  border:none;
  padding: 9px 16px;
  border-radius: var(--r-pill);
  background: var(--white);
  color: var(--charcoal-soft);
  font-weight: 600;
  font-size: 13.5px;
  font-family: inherit;
  cursor:pointer;
  border: 2px solid var(--line);
  white-space: nowrap;
  transition: all .15s ease;
}
.cat-tab.active{
  background: var(--charcoal);
  color: var(--white);
  border-color: var(--charcoal);
}

/* ---------- INGREDIENT GRID ---------- */
.section-label{
  display:flex; align-items:baseline; justify-content:space-between;
  margin: 20px 0 10px;
}
.section-label h2{
  font-family:'Fredoka', sans-serif;
  font-size: 17px;
  font-weight: 600;
  margin:0;
}
.section-label .count-pill{
  font-size: 12px;
  font-weight: 700;
  color: var(--coral-deep);
  background: rgba(255,107,82,0.12);
  padding: 3px 10px;
  border-radius: var(--r-pill);
}

.ing-grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
  margin-bottom: 6px;
}
.ing-chip{
  background: var(--white);
  border: 2px solid var(--line);
  border-radius: var(--r-md);
  padding: 11px 6px 9px;
  display:flex; flex-direction:column; align-items:center; gap:5px;
  cursor:pointer;
  user-select:none;
  transition: transform .12s ease, border-color .12s ease, background .12s ease, box-shadow .12s ease;
  text-align:center;
  position:relative;
}
.ing-chip .emoji{ font-size: 24px; line-height:1; }
.ing-chip .name{
  font-size: 11px;
  font-weight: 600;
  color: var(--charcoal-soft);
  line-height: 1.2;
}
.ing-chip:active{ transform: scale(0.93); }
.ing-chip.selected{
  border-color: var(--avocado);
  background: rgba(61,131,97,0.08);
  box-shadow: var(--shadow-card);
}
.ing-chip.selected .name{ color: var(--avocado-deep); }
.ing-chip.selected::after{
  content:"✓";
  position:absolute; top:-6px; right:-6px;
  width:20px; height:20px;
  background: var(--avocado);
  color:white;
  border-radius:50%;
  font-size:11px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  animation: pop .25s ease;
}
@keyframes pop{ from{ transform: scale(0); } to{ transform: scale(1); } }

.empty-search{
  text-align:center;
  padding: 30px 10px;
  color: var(--charcoal-soft);
  font-size: 14px;
}

/* ---------- FLOATING CTA ---------- */
.fab-wrap{
  position: fixed;
  left:0; right:0; bottom:0;
  display:flex; justify-content:center;
  padding: 0 18px calc(18px + env(safe-area-inset-bottom));
  pointer-events:none;
  z-index: 60;
}
.fab-wrap::before{
  content:"";
  position:absolute; left:0; right:0; bottom:0; top:-8px;
  background: linear-gradient(to bottom, transparent, var(--cream) 75%);
  pointer-events:none;
}
.fab{
  pointer-events:auto;
  max-width: 524px;
  width:100%;
  background: linear-gradient(135deg, var(--coral), var(--coral-deep));
  color: white;
  border:none;
  border-radius: var(--r-pill);
  padding: 16px 22px;
  font-family:'Fredoka', sans-serif;
  font-size: 16px;
  font-weight: 600;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow: var(--shadow-pop);
  cursor:pointer;
  transform: translateY(120%);
  transition: transform .3s cubic-bezier(.2,.9,.3,1.2);
}
.fab.show{ transform: translateY(0); }
.fab .fab-count{
  background: rgba(255,255,255,0.25);
  padding: 4px 11px;
  border-radius: var(--r-pill);
  font-size: 13.5px;
  font-weight: 700;
}
.fab:active{ transform: scale(0.97); }

/* ---------- RESULTS VIEW ---------- */
.results-header{
  display:flex; align-items:center; gap:10px;
  padding-top: calc(18px + env(safe-area-inset-top));
  margin-bottom: 6px;
}
.back-btn{
  border:none; background: var(--white);
  width:38px; height:38px; border-radius: var(--r-pill);
  display:flex; align-items:center; justify-content:center;
  box-shadow: var(--shadow-card);
  font-size: 17px;
  cursor:pointer;
  flex-shrink:0;
}
.back-btn:active{ transform: scale(0.9); }
.results-title{
  font-family:'Fredoka', sans-serif;
  font-size: 19px;
  font-weight: 600;
  margin:0;
}
.results-sub{
  font-size: 12.5px;
  color: var(--charcoal-soft);
  font-weight: 500;
}

.sort-row{
  display:flex; gap:8px;
  margin: 14px 0 16px;
  overflow-x:auto;
  scrollbar-width:none;
  mask-image: linear-gradient(to right, black calc(100% - 28px), transparent 100%);
  -webkit-mask-image: linear-gradient(to right, black calc(100% - 28px), transparent 100%);
}
.sort-row::-webkit-scrollbar{display:none;}
.sort-chip{
  flex:0 0 auto;
  border: 2px solid var(--line);
  background: var(--white);
  color: var(--charcoal-soft);
  font-weight: 600;
  font-size: 12.5px;
  padding: 7px 13px;
  border-radius: var(--r-pill);
  cursor:pointer;
  white-space:nowrap;
}
.sort-chip.active{
  background: var(--mango);
  border-color: var(--mango-deep);
  color: var(--charcoal);
}

.recipe-grid{
  display:flex; flex-direction:column;
  gap: 14px;
}
.recipe-card{
  background: var(--white);
  border-radius: var(--r-lg);
  padding: 16px;
  box-shadow: var(--shadow-card);
  cursor:pointer;
  display:flex; gap:14px;
  align-items:center;
  border: 2px solid transparent;
  transition: transform .12s ease, border-color .12s ease;
  position: relative;
  overflow:hidden;
}
.recipe-card:active{ transform: scale(0.98); border-color: var(--coral); }
.recipe-card .r-emoji{
  font-size: 38px;
  flex-shrink:0;
  width: 60px; height:60px;
  background: var(--cream-deep);
  border-radius: var(--r-md);
  display:flex; align-items:center; justify-content:center;
}
.recipe-card .r-body{ flex:1; min-width:0; }
.recipe-card .r-name{
  font-family:'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 15.5px;
  margin: 0 0 6px;
  line-height: 1.25;
}
.recipe-card .r-match{
  display:inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 9px;
  border-radius: var(--r-pill);
  margin-bottom: 6px;
}
.match-full{ background: rgba(61,131,97,0.14); color: var(--avocado-deep); }
.match-partial{ background: rgba(255,194,71,0.22); color: #946600; }
.recipe-card .r-meta{
  display:flex; gap:10px;
  font-size: 11.5px;
  color: var(--charcoal-soft);
  font-weight: 600;
  flex-wrap: wrap;
}
.recipe-card .r-meta span{ display:flex; align-items:center; gap:3px; }

.no-results{
  text-align:center;
  padding: 60px 20px;
}
.no-results .big-emoji{ font-size:52px; margin-bottom:14px; display:block; }
.no-results h3{
  font-family:'Fredoka', sans-serif;
  margin: 0 0 8px;
  font-size: 17px;
}
.no-results p{
  color: var(--charcoal-soft);
  font-size: 13.5px;
  line-height:1.5;
  margin:0;
}

/* ---------- RECIPE DETAIL MODAL ---------- */
.modal-overlay{
  position: fixed; inset:0;
  background: rgba(43,33,24,0.45);
  z-index: 100;
  opacity:0;
  pointer-events:none;
  transition: opacity .25s ease;
}
.modal-overlay.show{ opacity:1; pointer-events:auto; }
.modal-sheet{
  position: fixed;
  left:0; right:0; bottom:0;
  max-width: 560px;
  margin: 0 auto;
  background: var(--cream);
  border-radius: 28px 28px 0 0;
  max-height: 88vh;
  transform: translateY(100%);
  transition: transform .32s cubic-bezier(.22,.9,.3,1.1);
  z-index: 101;
  display:flex; flex-direction:column;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.25);
}
.modal-sheet.show{ transform: translateY(0); }
.modal-handle{
  width:40px; height:5px;
  background: var(--line);
  border-radius: var(--r-pill);
  margin: 12px auto 4px;
  flex-shrink:0;
}
.modal-scroll{
  overflow-y:auto;
  padding: 6px 22px calc(28px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch;
}
.modal-head{
  display:flex; align-items:flex-start; gap:14px;
  padding: 14px 0 18px;
}
.modal-head .m-emoji{
  font-size: 44px;
  width:68px; height:68px;
  background: var(--white);
  border-radius: var(--r-md);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow: var(--shadow-card);
}
.modal-head h2{
  font-family:'Fredoka', sans-serif;
  font-size: 20px;
  font-weight: 600;
  margin: 2px 0 8px;
  line-height:1.25;
}
.modal-close{
  position:absolute; top:14px; right:18px;
  width:32px; height:32px;
  border-radius:50%;
  background: var(--white);
  border:none;
  display:flex; align-items:center; justify-content:center;
  box-shadow: var(--shadow-card);
  cursor:pointer;
  font-size:14px;
  color: var(--charcoal-soft);
}

.stat-row{
  display:flex; gap:8px;
  margin-bottom: 18px;
}
.stat-pill{
  flex:1;
  background: var(--white);
  border-radius: var(--r-md);
  padding: 10px 8px;
  text-align:center;
  box-shadow: var(--shadow-card);
}
.stat-pill .v{
  font-family:'Fredoka', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--coral-deep);
  display:block;
}
.stat-pill .l{
  font-size: 10px;
  color: var(--charcoal-soft);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.portion-control{
  display:flex; align-items:center; justify-content:space-between;
  background: var(--white);
  border-radius: var(--r-md);
  padding: 12px 16px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-card);
}
.portion-control .pc-label{ font-size:13px; font-weight:600; color:var(--charcoal-soft); }
.portion-stepper{ display:flex; align-items:center; gap:14px; }
.portion-stepper button{
  width:30px; height:30px;
  border-radius:50%;
  border:none;
  background: var(--cream-deep);
  font-size:16px;
  font-weight:700;
  color: var(--coral-deep);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.portion-stepper button:active{ transform: scale(0.88); }
.portion-stepper .pc-val{
  font-family:'Fredoka', sans-serif;
  font-weight:600;
  font-size:16px;
  min-width:18px;
  text-align:center;
}

.block-title{
  font-family:'Fredoka', sans-serif;
  font-size: 15px;
  font-weight: 600;
  margin: 0 0 10px;
  display:flex; align-items:center; gap:7px;
}

.ing-list{
  list-style:none; margin:0 0 22px; padding:0;
  display:flex; flex-direction:column; gap:8px;
}
.ing-list li{
  background: var(--white);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  display:flex; align-items:center; justify-content:space-between;
  font-size: 13.5px;
  box-shadow: var(--shadow-card);
}
.ing-list li .own-tag{
  font-size: 10px;
  font-weight:700;
  color: var(--avocado-deep);
  background: rgba(61,131,97,0.12);
  padding: 2px 8px;
  border-radius: var(--r-pill);
}
.ing-list li .miss-tag{
  font-size: 10px;
  font-weight:700;
  color: var(--coral-deep);
  background: rgba(255,107,82,0.1);
  padding: 2px 8px;
  border-radius: var(--r-pill);
}
.ing-list li .ing-name{ display:flex; align-items:center; gap:8px; font-weight:600; }

.steps-list{
  list-style:none; margin:0; padding:0;
  counter-reset: step;
  display:flex; flex-direction:column; gap:14px;
}
.steps-list li{
  counter-increment: step;
  display:flex; gap:12px;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--charcoal);
}
.steps-list li::before{
  content: counter(step);
  font-family:'Fredoka', sans-serif;
  flex-shrink:0;
  width:26px; height:26px;
  background: var(--charcoal);
  color: var(--white);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12.5px;
  font-weight:600;
}

/* ---------- TOAST ---------- */
.toast{
  position: fixed;
  top: calc(14px + env(safe-area-inset-top));
  left:50%;
  transform: translate(-50%, -120%);
  background: var(--charcoal);
  color: var(--white);
  padding: 11px 20px;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  z-index: 200;
  transition: transform .3s cubic-bezier(.2,.9,.3,1.2);
  white-space:nowrap;
}
.toast.show{ transform: translate(-50%, 0); }

@media (min-width:420px){
  .ing-grid{ grid-template-columns: repeat(4, 1fr); }
}

/* ---------- TOP NAV (Recettes / Calculateur) ---------- */
.top-nav{
  display:flex;
  gap:8px;
  margin-top:14px;
  background: var(--cream-deep);
  border-radius: var(--r-pill);
  padding: 4px;
}
.top-nav-btn{
  flex:1;
  border:none;
  background: transparent;
  padding: 9px 10px;
  border-radius: var(--r-pill);
  font-family:'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 13.5px;
  color: var(--charcoal-soft);
  cursor:pointer;
  transition: all .15s ease;
}
.top-nav-btn.active{
  background: var(--white);
  color: var(--charcoal);
  box-shadow: var(--shadow-card);
}

/* ---------- SEARCH CLEAR BUTTON ---------- */
.search-clear{
  position:absolute; right:14px; top:50%; transform: translateY(-50%);
  border:none; background: var(--line);
  width:22px; height:22px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px;
  color: var(--charcoal-soft);
  cursor:pointer;
}

/* ---------- HALAL BADGES ---------- */
.halal-badge{
  position:absolute; top:6px; right:6px;
  font-size:11px;
  line-height:1;
}
.mini-halal{ font-size: 11px; }
.halal-pill{
  display:inline-block;
  font-size: 11px;
  font-weight:700;
  color: var(--avocado-deep);
  background: rgba(61,131,97,0.14);
  padding: 3px 10px;
  border-radius: var(--r-pill);
  margin-top: 2px;
}
.r-badges{
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  margin-bottom: 6px;
}
.r-halal{
  font-size: 11px;
  font-weight: 700;
  color: var(--avocado-deep);
  background: rgba(61,131,97,0.14);
  padding: 2px 9px;
  border-radius: var(--r-pill);
}

/* ---------- RECIPE META (5 stats, allow wrap) ---------- */
.recipe-card .r-meta{
  gap: 8px 10px;
}

/* second stat row in modal (glucides/lipides/portions) */
.stat-row + .stat-row{
  margin-top: -8px;
}
.stat-pill.alt .v{ color: var(--avocado-deep); }

.ing-list li{ gap: 8px; }
.ing-right{
  display:flex; align-items:center; gap:8px;
  flex-shrink:0;
}
.ing-qty{
  font-size: 12px;
  font-weight:700;
  color: var(--charcoal-soft);
  background: var(--cream-deep);
  padding: 2px 8px;
  border-radius: var(--r-pill);
  white-space: nowrap;
}

/* ---------- CALCULATEUR ---------- */
.calc-totals{
  display:flex; gap:8px;
  margin: 14px 0 4px;
}
.calc-total-pill{
  flex:1;
  background: var(--white);
  border-radius: var(--r-md);
  padding: 10px 6px;
  text-align:center;
  box-shadow: var(--shadow-card);
}
.calc-total-pill.main{
  background: linear-gradient(135deg, var(--coral), var(--coral-deep));
  box-shadow: var(--shadow-pop);
}
.calc-total-pill.main .v, .calc-total-pill.main .l{ color: white; }
.calc-total-pill .v{
  font-family:'Fredoka', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--coral-deep);
  display:block;
  line-height:1.3;
}
.calc-total-pill .l{
  font-size: 9.5px;
  color: var(--charcoal-soft);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.calc-list{
  display:flex; flex-direction:column;
  gap: 10px;
}
.calc-row{
  background: var(--white);
  border-radius: var(--r-md);
  padding: 12px 14px;
  box-shadow: var(--shadow-card);
  border: 2px solid transparent;
  transition: border-color .15s ease;
  position: relative;
}
.calc-row.active{
  border-color: var(--avocado);
  background: rgba(61,131,97,0.05);
}
.calc-row-main{
  display:flex; align-items:center; gap:12px;
}
.calc-emoji{ font-size: 26px; flex-shrink:0; }
.calc-row-text{
  display:flex; flex-direction:column; gap:2px;
  min-width:0;
}
.calc-name{
  font-weight: 700;
  font-size: 14px;
  color: var(--charcoal);
}
.calc-per100{
  font-size: 11px;
  color: var(--charcoal-soft);
  font-weight: 500;
}
.calc-row-control{
  display:flex; align-items:center; justify-content:flex-end;
  gap:8px;
  margin-top: 10px;
}
.calc-add-btn{
  border: none;
  background: var(--mango);
  color: var(--charcoal);
  font-weight: 700;
  font-size: 13px;
  padding: 8px 16px;
  border-radius: var(--r-pill);
  cursor:pointer;
  width:100%;
}
.calc-add-btn:active{ transform: scale(0.96); }
.calc-qty-btn{
  width:30px; height:30px;
  border-radius:50%;
  border:none;
  background: var(--cream-deep);
  font-size:16px;
  font-weight:700;
  color: var(--coral-deep);
  cursor:pointer;
  flex-shrink:0;
}
.calc-qty-btn:active{ transform: scale(0.88); }
.calc-qty-input{
  width: 64px;
  text-align:center;
  border: 2px solid var(--line);
  border-radius: var(--r-sm);
  padding: 6px 4px;
  font-family:'Fredoka', sans-serif;
  font-weight:600;
  font-size: 14px;
  color: var(--charcoal);
  -moz-appearance: textfield;
}
.calc-qty-input::-webkit-outer-spin-button,
.calc-qty-input::-webkit-inner-spin-button{
  -webkit-appearance: none; margin:0;
}
.calc-unit{
  font-size: 12px;
  font-weight:700;
  color: var(--charcoal-soft);
}
.calc-row-cal{
  position:absolute;
  top:12px; right:14px;
  font-size: 11px;
  font-weight: 700;
  color: var(--coral-deep);
  background: rgba(255,107,82,0.1);
  padding: 3px 9px;
  border-radius: var(--r-pill);
}

/* ============================================================
   MODE DESKTOP — s'active automatiquement au-delà de 900px.
   Aucune action de l'utilisateur requise : la mise en page
   bascule seule selon la largeur de la fenêtre.
   ============================================================ */
@media (min-width: 900px){

  body{ padding-bottom: 40px; }

  /* Header : on garde une colonne centrale lisible pour le logo/recherche/filtres,
     même si .app est large, pour éviter une barre de recherche démesurée. */
  .topbar{
    padding-top: 28px;
  }
  .brand, .search-wrap, .cat-tabs, .top-nav, .section-label{
    max-width: 640px;
    margin-left: auto !important;
    margin-right: auto !important;
  }
  .search-wrap input{
    cursor: text;
  }
  .cat-tabs{
    mask-image: none;
    -webkit-mask-image: none;
    flex-wrap: wrap;
    overflow: visible;
  }

  .section-label{
    max-width: 640px;
  }

  /* Grille d'aliments : passe en grille large, plus de colonnes, chips légèrement plus grandes */
  .ing-grid{
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
  }
  .ing-chip{
    padding: 16px 8px 12px;
    cursor: pointer;
  }
  .ing-chip:hover:not(.selected){
    border-color: var(--coral);
    transform: translateY(-2px);
    box-shadow: var(--shadow-card);
  }
  .ing-chip .emoji{ font-size: 28px; }

  /* Résultats recettes : grille de cards au lieu d'une colonne empilée */
  .results-header{
    padding-top: 28px;
  }
  .sort-row{
    mask-image: none;
    -webkit-mask-image: none;
    flex-wrap: wrap;
    overflow: visible;
  }
  .sort-chip, .cat-tab, .top-nav-btn{
    cursor: pointer;
  }
  .sort-chip:hover:not(.active), .cat-tab:hover:not(.active){
    border-color: var(--coral);
  }
  .recipe-grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .recipe-card{
    align-items: flex-start;
    cursor: pointer;
  }
  .recipe-card:hover{
    transform: translateY(-2px);
    border-color: var(--coral);
    box-shadow: 0 8px 20px rgba(43,33,24,0.12);
  }

  /* FAB : centré dans la largeur du contenu plutôt que pleine largeur d'écran */
  .fab-wrap{
    padding: 0 32px 28px;
  }
  .fab{
    max-width: 420px;
    margin: 0 auto;
    cursor: pointer;
  }

  /* Modal recette : vraie fenêtre centrée au lieu d'un bottom-sheet mobile */
  .modal-sheet{
    left: 50%;
    right: auto;
    bottom: auto;
    top: 50%;
    transform: translate(-50%, -45%);
    max-width: 580px;
    width: 90%;
    max-height: 85vh;
    border-radius: var(--r-lg);
    box-shadow: 0 24px 60px rgba(43,33,24,0.3);
    opacity: 0;
    pointer-events: none;
    transition: transform .32s cubic-bezier(.22,.9,.3,1.1), opacity .2s ease;
  }
  .modal-sheet.show{
    transform: translate(-50%, -50%);
    opacity: 1;
    pointer-events: auto;
  }
  .modal-handle{ display: none; }
  .modal-close{ cursor: pointer; }
  .modal-close:hover{ background: var(--cream-deep); }

  /* Calculateur : grille 2 colonnes pour les lignes d'aliments */
  .calc-list{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .calc-totals{
    max-width: 640px;
  }
  .calc-add-btn, .calc-qty-btn{ cursor: pointer; }
  .calc-row:hover{ box-shadow: 0 6px 18px rgba(43,33,24,0.1); }

  /* Boutons divers : curseur souris cohérent */
  .reset-btn, .recipe-card, .back-btn, .search-clear{
    cursor: pointer;
  }
  .reset-btn:hover{ background: var(--cream-deep); }
  .back-btn:hover{ background: var(--cream-deep); }
}

/* Très grands écrans : un peu plus de colonnes pour profiter de l'espace */
@media (min-width: 1300px){
  .ing-grid{
    grid-template-columns: repeat(7, 1fr);
  }
  .recipe-grid{
    grid-template-columns: repeat(3, 1fr);
  }
  .calc-list{
    grid-template-columns: repeat(3, 1fr);
  }
}

</style>

</head>
<body>

<div id="app" class="app"></div>

<div id="fabWrap" class="fab-wrap">
  <button id="fabBtn" class="fab">
    <span id="fabLabel">Voir mes recettes</span>
    <span id="fabCount" class="fab-count">0</span>
  </button>
</div>

<div id="modalOverlay" class="modal-overlay"></div>
<div id="modalSheet" class="modal-sheet"></div>
<div id="toast" class="toast"></div>

<script src="recipes-data.js"></script>
<script src="app.js"></script>
</body>
</html>
